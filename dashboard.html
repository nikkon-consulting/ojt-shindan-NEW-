<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT簡易診断 集計ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#F5F7FA;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;justify-content:center}
.dash{width:100%;max-width:960px;padding:20px 24px}
.header{text-align:center;margin-bottom:16px}
.header h1{font-size:20px;font-weight:800;color:#1A1D26;margin-bottom:2px}
.header p{font-size:12px;color:#8B8FA3}
.status-bar{text-align:center;margin-bottom:14px;font-size:11px;color:#8B8FA3}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,.04);padding:18px 20px}
.card-title{font-size:14px;font-weight:700;color:#1A1D26;margin-bottom:12px;text-align:center}
.type-row{display:flex;align-items:center;gap:16px}
.chart-wrap{width:140px;height:140px;flex-shrink:0}
.legend{display:flex;flex-direction:column;gap:5px;font-size:12px;color:#555}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.type-highlight{background:#FAFBFC;border-radius:8px;padding:10px;text-align:center;margin-top:10px}
.type-highlight-label{font-size:11px;color:#8B8FA3}
.type-highlight-val{font-size:16px;font-weight:700;margin-top:2px}
.conf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.conf-col{text-align:center}
.conf-label{font-size:12px;font-weight:600;color:#333;margin-bottom:8px}
.conf-chart-wrap{width:110px;height:110px;margin:0 auto}
.conf-legend{display:flex;gap:8px;justify-content:center;margin-top:6px;font-size:11px;color:#555}
.conf-legend-item{display:flex;align-items:center;gap:3px}
.conf-legend-dot{width:8px;height:8px;border-radius:2px}
.conf-highlight{background:#FAFBFC;border-radius:8px;padding:8px 10px;text-align:center;margin-top:10px;font-size:12px;color:#555;line-height:1.5}
.no-data{text-align:center;padding:40px 20px;color:#8B8FA3;font-size:14px;grid-column:1/-1}
</style>
</head>
<body>
<div class="dash">
  <div class="header">
    <h1>📊 OJT簡易診断 集計結果</h1>
    <p>本日の参加者の診断結果</p>
  </div>
  <div class="status-bar" id="status-text">データ取得中...</div>
  <div class="grid" id="main-grid">
    <div class="no-data" id="no-data">まだ回答データがありません。<br>参加者が診断を完了すると表示されます。</div>
  </div>
  <div class="grid" id="charts-grid" style="display:none">
    <div class="card">
      <div class="card-title">診断タイプの分布</div>
      <div class="type-row">
        <div class="chart-wrap"><canvas id="typeChart"></canvas></div>
        <div class="legend" id="type-legend"></div>
      </div>
      <div class="type-highlight" id="type-highlight"></div>
    </div>
    <div class="card">
      <div class="card-title">現場の実態把握度</div>
      <div class="conf-grid">
        <div class="conf-col">
          <div class="conf-label">教える側</div>
          <div class="conf-chart-wrap"><canvas id="confTeachChart"></canvas></div>
          <div class="conf-legend" id="conf-teach-legend"></div>
        </div>
        <div class="conf-col">
          <div class="conf-label">教わる側</div>
          <div class="conf-chart-wrap"><canvas id="confLearnChart"></canvas></div>
          <div class="conf-legend" id="conf-learn-legend"></div>
        </div>
      </div>
      <div class="conf-highlight" id="conf-highlight"></div>
    </div>
  </div>
</div>

<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbxKXhQhCFjH5FXD_DNflowSYcA4mLjn_jykY73mlEp4Bmr9y51Z-WEGvncYEV9XJr0O/exec';
var REFRESH_INTERVAL=15000;
var typeChartInstance=null,confTeachChartInstance=null,confLearnChartInstance=null;

function fetchData(){
  var existing=document.getElementById('jsonp-script');
  if(existing)existing.remove();
  var s=document.createElement('script');
  s.id='jsonp-script';
  s.src=GAS_URL+'?action=getData&t='+Date.now();
  s.onerror=function(){document.getElementById('status-text').textContent='データ取得に失敗しました'};
  document.head.appendChild(s);
}
function callback(response){
  if(response.status==='success')renderDashboard(response.data);
}

function renderDashboard(data){
  if(!data||data.length===0){
    document.getElementById('no-data').style.display='block';
    document.getElementById('charts-grid').style.display='none';
    document.getElementById('main-grid').style.display='grid';
    document.getElementById('status-text').textContent='データなし — 自動更新中';
    return;
  }
  document.getElementById('main-grid').style.display='none';
  document.getElementById('charts-grid').style.display='grid';
  document.getElementById('status-text').textContent='最終更新: '+new Date().toLocaleTimeString('ja-JP');

  var typeCounts={good:0,gap:0,self:0,rebuild:0};
  var typeNames={'好循環型':'good','伝達ギャップ型':'gap','自走型':'self','立て直し型':'rebuild'};
  data.forEach(function(r){var k=typeNames[r.resultType];if(k)typeCounts[k]++});
  var total=data.length;
  var typeData=[
    {key:'good',name:'好循環型',count:typeCounts.good,color:'#27AE60'},
    {key:'gap',name:'伝達ギャップ型',count:typeCounts.gap,color:'#F2994A'},
    {key:'self',name:'自走型',count:typeCounts.self,color:'#2D9CDB'},
    {key:'rebuild',name:'立て直し型',count:typeCounts.rebuild,color:'#EB5757'}
  ];

  if(typeChartInstance)typeChartInstance.destroy();
  typeChartInstance=new Chart(document.getElementById('typeChart'),{
    type:'doughnut',
    data:{labels:typeData.map(function(d){return d.name}),datasets:[{data:typeData.map(function(d){return d.count}),backgroundColor:typeData.map(function(d){return d.color}),borderColor:'#fff',borderWidth:3}]},
    options:{responsive:true,maintainAspectRatio:true,cutout:'55%',plugins:{legend:{display:false},tooltip:{enabled:true}}}
  });

  var lh='';
  typeData.forEach(function(d){
    var pct=total>0?Math.round(d.count/total*100):0;
    lh+='<span class="legend-item"><span class="legend-dot" style="background:'+d.color+'"></span>'+d.name+' '+pct+'%</span>';
  });
  document.getElementById('type-legend').innerHTML=lh;

  var maxType=typeData.reduce(function(a,b){return a.count>=b.count?a:b});
  var maxPct=total>0?Math.round(maxType.count/total*100):0;
  document.getElementById('type-highlight').innerHTML='<div class="type-highlight-label">最も多いタイプ</div><div class="type-highlight-val" style="color:'+maxType.color+'">'+maxType.name+'（'+maxPct+'%）</div>';

  var cTY=0,cTN=0,cLY=0,cLN=0;
  data.forEach(function(r){
    if(r.confidence_teach==='yes')cTY++;else if(r.confidence_teach==='no')cTN++;
    if(r.confidence_learn==='yes')cLY++;else if(r.confidence_learn==='no')cLN++;
  });
  var cTT=cTY+cTN,cLT=cLY+cLN;

  if(confTeachChartInstance)confTeachChartInstance.destroy();
  confTeachChartInstance=new Chart(document.getElementById('confTeachChart'),{
    type:'doughnut',
    data:{labels:['把握','未把握'],datasets:[{data:[cTY,cTN],backgroundColor:['#27AE60','#E8EAF0'],borderColor:'#fff',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{legend:{display:false},tooltip:{enabled:true}}}
  });
  var tYP=cTT>0?Math.round(cTY/cTT*100):0,tNP=cTT>0?Math.round(cTN/cTT*100):0;
  document.getElementById('conf-teach-legend').innerHTML='<span class="conf-legend-item"><span class="conf-legend-dot" style="background:#27AE60"></span>'+tYP+'%</span><span class="conf-legend-item"><span class="conf-legend-dot" style="background:#E8EAF0"></span>'+tNP+'%</span>';

  if(confLearnChartInstance)confLearnChartInstance.destroy();
  confLearnChartInstance=new Chart(document.getElementById('confLearnChart'),{
    type:'doughnut',
    data:{labels:['把握','未把握'],datasets:[{data:[cLY,cLN],backgroundColor:['#27AE60','#E8EAF0'],borderColor:'#fff',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{legend:{display:false},tooltip:{enabled:true}}}
  });
  var lYP=cLT>0?Math.round(cLY/cLT*100):0,lNP=cLT>0?Math.round(cLN/cLT*100):0;
  document.getElementById('conf-learn-legend').innerHTML='<span class="conf-legend-item"><span class="conf-legend-dot" style="background:#27AE60"></span>'+lYP+'%</span><span class="conf-legend-item"><span class="conf-legend-dot" style="background:#E8EAF0"></span>'+lNP+'%</span>';

  var cm='';
  if(lNP>=50)cm='教わる側の実態を把握できていない方が'+lNP+'%';
  else if(tNP>=50)cm='教える側の実態を把握できていない方が'+tNP+'%';
  else cm='多くの方が実態を把握できていると回答';
  document.getElementById('conf-highlight').innerHTML=cm;
}

fetchData();
setInterval(fetchData,REFRESH_INTERVAL);
</script>
</body>
</html>
